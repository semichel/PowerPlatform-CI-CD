name: Deploy Power Automate Flow

on:
  push:
    branches:
      - main  # Körs när vi pushar till main-branchen

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Set up Node.js 16 (Fix for Power Platform CLI)
        uses: actions/setup-node@v3
        with:
          node-version: 16  # Ändrat från 18 till 16

      - name: Install Power Platform CLI
        run: |
          npm install -g pac

      - name: Authenticate to Power Platform
        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          TENANT_ID: ${{ secrets.TENANT_ID }}
        run: |
          pac auth create --applicationId $CLIENT_ID --clientSecret $CLIENT_SECRET --tenant $TENANT_ID --url "https://your-org.crm.dynamics.com"

      - name: Deploy Power Automate Flow
        run: |
          pac flow import --path ./flows/myflow.zip --environment "YourEnvironmentId"
